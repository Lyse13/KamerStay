# Règles d'alerte — KamerStay
groups:
  - name: kamerstay_alerts
    rules:
      # Alerte si le backend ne répond plus
      - alert: KamerStayBackendDown
        expr: up{job="kamerstay-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Le backend KamerStay est injoignable"
          description: "L'endpoint /metrics du backend ne répond pas depuis 1 minute."

      # Alerte si le taux d'erreurs HTTP 5xx est élevé
      - alert: HighServerErrorRate
        expr: sum(rate(ktor_http_server_requests_seconds_count{status=~"5.."}[5m])) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreurs serveur élevé"
          description: "Plus de 0.1 requête/s renvoie une erreur 5xx depuis 2 minutes."

      # Alerte si l'usage mémoire de la machine dépasse 90%
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Mémoire système élevée"
          description: "L'utilisation mémoire dépasse 90% depuis 2 minutes."